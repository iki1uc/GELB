<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GELB · Lauffähigkeit · Farb‑Engine</title>

<style>
  body { background:#000; color:#ff0; font-family:Consolas; padding:20px; }
  h1, h2 { color:#ffd700; }
  .block { background:#111; border:1px solid #333; padding:15px; margin:20px 0; }
  pre { background:#000; border:1px solid #333; padding:12px; }

  .green { color:#00ff88; }
  .yellow { color:#ffff33; }
  .orange { color:#ff9900; }
  .red { color:#ff4444; }
  .turquoise { color:#00ffff; }
  .blue { color:#3399ff; }
</style>

<script>
// ------------------------------------------------------
// GELB – operative Farb‑Engine
// ------------------------------------------------------

const FILES = [
  "BEN.tmp","DA.tmp","NE.tmp",
  "C.tmp","X.tmp","Z.tmp",
  "ORT.scan","scan.language",
  "gone.room","ID.html",
  "index.html","verify.html",
  "README.md"
];

// Gewichtung für Lauffähigkeit
const WEIGHTS = {
  "BEN.tmp": 15,
  "DA.tmp": 15,
  "NE.tmp": 15,
  "C.tmp": 20,
  "X.tmp": 10,
  "Z.tmp": 10,
  "ORT.scan": 5,
  "scan.language": 5,
  "gone.room": 2,
  "ID.html": 1,
  "index.html": 1,
  "verify.html": 1,
  "README.md": 0
};

// Datei‑Check
async function checkFile(name){
  try{
    const res = await fetch("./" + name);
    if(!res.ok) return { name, ok:false };
    const txt = await res.text();
    return { name, ok:true, content:txt };
  }catch(e){
    return { name, ok:false };
  }
}

// Score berechnen
function calcScore(results){
  let score = 0;
  results.forEach(r => {
    if(r.ok) score += WEIGHTS[r.name];
  });
  return score;
}

// Farb‑Logik
function color(score){
  if(score >= 95) return { c:"green", t:"GRÜN – 100% perfekt" };
  if(score >= 75) return { c:"yellow", t:"GELB – lauffähig, selbsttätig" };
  if(score >= 50) return { c:"orange", t:"ORANGE – relevant, braucht Korrektur" };
  if(score >= 25) return { c:"red", t:"ROT – kritisch, Fehler" };
  if(score >= 10) return { c:"turquoise", t:"TÜRKIS – Leitung nötig" };
  return { c:"blue", t:"BLAU – System‑Master erforderlich" };
}

// Start
async function start(){
  const results = [];
  for(const f of FILES){
    results.push(await checkFile(f));
  }

  const score = calcScore(results);
  const col = color(score);

  document.getElementById("score").textContent = score + "%";
  document.getElementById("color").textContent = col.t;
  document.getElementById("color").className = col.c;

  const out = document.getElementById("files");
  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "block";
    div.innerHTML = `
      <h2 class="${r.ok ? 'green' : 'red'}">${r.name}</h2>
      <pre>${r.ok ? "OK" : "FEHLT"}</pre>
    `;
    out.appendChild(div);
  });
}
</script>
</head>

<body onload="start()">

<h1>GELB · Lauffähigkeit · Farb‑Engine</h1>

<div class="block">
  <h2>Score</h2>
  <pre id="score">…</pre>
</div>

<div class="block">
  <h2>Farb‑Bewertung</h2>
  <pre id="color">…</pre>
</div>

<div id="files"></div>

</body>
</html>
